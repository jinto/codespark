name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Create GhosttyKit stub
        run: |
          FWDIR="vendor/ghostty/macos/GhosttyKit.xcframework"
          LIBDIR="$FWDIR/macos-arm64"
          mkdir -p "$LIBDIR/Headers"

          # Info.plist
          cat > "$FWDIR/Info.plist" << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>CFBundlePackageType</key><string>XFWK</string>
            <key>XCFrameworkFormatVersion</key><string>1.0</string>
            <key>AvailableLibraries</key><array><dict>
              <key>LibraryIdentifier</key><string>macos-arm64</string>
              <key>LibraryPath</key><string>libghostty.a</string>
              <key>HeadersPath</key><string>Headers</string>
              <key>SupportedPlatform</key><string>macos</string>
              <key>SupportedArchitectures</key><array><string>arm64</string></array>
            </dict></array>
          </dict></plist>
          PLIST

          # Minimal C stub with all symbols the linker expects
          cat > /tmp/ghostty_stub.c << 'STUB'
          // Empty stubs — real Ghostty not available in CI
          void ghostty_init() {}
          void ghostty_app_new() {}
          void ghostty_app_free() {}
          void ghostty_app_tick() {}
          void ghostty_config_new() {}
          void ghostty_config_free() {}
          void ghostty_config_load_file() {}
          void ghostty_config_finalize() {}
          void ghostty_surface_config_new() {}
          void ghostty_surface_new() {}
          void ghostty_surface_free() {}
          void ghostty_surface_set_content_scale() {}
          void ghostty_surface_set_size() {}
          void ghostty_surface_key() {}
          void ghostty_surface_mouse_button() {}
          void ghostty_surface_mouse_pos() {}
          void ghostty_surface_mouse_scroll() {}
          void ghostty_surface_text() {}
          void ghostty_surface_size() {}
          void ghostty_surface_read_text() {}
          void ghostty_surface_free_text() {}
          STUB
          clang -c -target arm64-apple-macos14 /tmp/ghostty_stub.c -o /tmp/ghostty_stub.o
          ar rcs "$LIBDIR/libghostty.a" /tmp/ghostty_stub.o

          # Empty header
          touch "$LIBDIR/Headers/ghostty.h"

      - name: Disable GHOSTTY_FIRST in pbxproj
        run: |
          sed -i '' '/"- D"/d; /GHOSTTY_FIRST/d' apps/macos/CodeSpark.xcodeproj/project.pbxproj
          sed -i '' '/"-D"/d' apps/macos/CodeSpark.xcodeproj/project.pbxproj

      - name: Build Release
        run: |
          xcodebuild -project apps/macos/CodeSpark.xcodeproj \
            -scheme CodeSpark \
            -configuration Release \
            -derivedDataPath build \
            -destination "platform=macOS,arch=arm64" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            build

      - name: Create DMG
        run: |
          brew install create-dmg
          APP_PATH="build/Build/Products/Release/CodeSpark.app"
          create-dmg \
            --volname "CodeSpark" \
            --volicon "$APP_PATH/Contents/Resources/AppIcon.icns" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "CodeSpark.app" 150 185 \
            --app-drop-link 450 185 \
            --no-internet-enable \
            "CodeSpark-${GITHUB_REF_NAME}.dmg" \
            "$APP_PATH" || true

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: CodeSpark-*.dmg
          generate_release_notes: true
