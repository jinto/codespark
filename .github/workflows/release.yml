name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build Release
        run: |
          xcodebuild -project apps/macos/CodeSpark.xcodeproj \
            -scheme CodeSpark \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            build

      - name: Create DMG
        run: |
          brew install create-dmg
          APP_PATH="build/Build/Products/Release/CodeSpark.app"
          create-dmg \
            --volname "CodeSpark" \
            --volicon "$APP_PATH/Contents/Resources/AppIcon.icns" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "CodeSpark.app" 150 185 \
            --app-drop-link 450 185 \
            --no-internet-enable \
            "CodeSpark-${GITHUB_REF_NAME}.dmg" \
            "$APP_PATH" || true

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: CodeSpark-*.dmg
          generate_release_notes: true
