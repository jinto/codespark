name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Create GhosttyKit stub
        run: |
          mkdir -p vendor/ghostty/macos/GhosttyKit.xcframework/macos-arm64/Headers
          cat > vendor/ghostty/macos/GhosttyKit.xcframework/Info.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>CFBundlePackageType</key><string>XFWK</string>
            <key>XCFrameworkFormatVersion</key><string>1.0</string>
            <key>AvailableLibraries</key><array><dict>
              <key>LibraryIdentifier</key><string>macos-arm64</string>
              <key>LibraryPath</key><string>libghostty.a</string>
              <key>HeadersPath</key><string>Headers</string>
              <key>SupportedPlatform</key><string>macos</string>
              <key>SupportedArchitectures</key><array><string>arm64</string></array>
            </dict></array>
          </dict></plist>
          PLIST
          touch vendor/ghostty/macos/GhosttyKit.xcframework/macos-arm64/Headers/ghostty.h
          echo "" | clang -c -x c - -o /tmp/empty.o
          ar rcs vendor/ghostty/macos/GhosttyKit.xcframework/macos-arm64/libghostty.a /tmp/empty.o

      - name: Build Release
        run: |
          xcodebuild -project apps/macos/CodeSpark.xcodeproj \
            -scheme CodeSpark \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            SWIFT_ACTIVE_COMPILATION_CONDITIONS='$(inherited)' \
            build

      - name: Create DMG
        run: |
          brew install create-dmg
          APP_PATH="build/Build/Products/Release/CodeSpark.app"
          create-dmg \
            --volname "CodeSpark" \
            --volicon "$APP_PATH/Contents/Resources/AppIcon.icns" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "CodeSpark.app" 150 185 \
            --app-drop-link 450 185 \
            --no-internet-enable \
            "CodeSpark-${GITHUB_REF_NAME}.dmg" \
            "$APP_PATH" || true

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: CodeSpark-*.dmg
          generate_release_notes: true
