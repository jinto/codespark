name: StatefulTerminal
options:
  minimumXcodeGenVersion: 2.38.0
settings:
  base:
    SWIFT_VERSION: 5.10
targets:
  StatefulTerminal:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - StatefulTerminal
    preBuildScripts:
      - name: Build workspace-ffi (Rust)
        basedOnDependencyAnalysis: false
        script: |
          if [ "$CONFIGURATION" = "Release" ]; then
            cargo build -p workspace-ffi --release
          else
            cargo build -p workspace-ffi
          fi
    dependencies:
      - framework: ../../vendor/ghostty/macos/GhosttyKit.xcframework
        embed: false
      - sdk: AppKit.framework
      - sdk: Carbon.framework
      - sdk: CoreFoundation.framework
      - sdk: CoreGraphics.framework
      - sdk: CoreText.framework
      - sdk: IOKit.framework
      - sdk: Metal.framework
      - sdk: QuartzCore.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jinto.stateful-terminal
        GENERATE_INFOPLIST_FILE: YES
        OTHER_LDFLAGS:
          - $(inherited)
          - -lworkspace_ffi
          - -lc++
        OTHER_SWIFT_FLAGS:
          - $(inherited)
          - -D
          - GHOSTTY_FIRST
        SWIFT_OBJC_BRIDGING_HEADER: StatefulTerminal/Bridge/StatefulTerminal-Bridging-Header.h
      configs:
        Debug:
          LIBRARY_SEARCH_PATHS:
            - $(SRCROOT)/../../target/debug/deps
        Release:
          LIBRARY_SEARCH_PATHS:
            - $(SRCROOT)/../../target/release/deps
  StatefulTerminalTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - StatefulTerminalTests
    dependencies:
      - target: StatefulTerminal
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
